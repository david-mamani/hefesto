# Deployed via Dokploy (Compose). Variables come from the Dokploy Environment
# tab (written to .env): NEXT_PUBLIC_* are needed at BUILD time, the rest at runtime.
services:
  hefesto:
    build:
      context: .
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      APP_SECRET: ${APP_SECRET}
      COGNEE_API_KEY: ${COGNEE_API_KEY}
      COGNEE_BASE_URL: ${COGNEE_BASE_URL}
      GROQ_API_KEY: ${GROQ_API_KEY}
      ISOLATION_PATTERN: ${ISOLATION_PATTERN}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      TELEGRAM_DEMO_CHAT_ID: ${TELEGRAM_DEMO_CHAT_ID}
    ports:
      - "3000"
    restart: unless-stopped
